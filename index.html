<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Sky Login & Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background from Cool Sky image theme */
            background: linear-gradient(180deg, #64B5F6 0%, #BBDEFB 60%, #FFFFFF 100%);
            overflow: hidden;
            perspective: 1000px;
        }

        /* Animated Floating Particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 400px;
            padding: 50px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: 0.5s ease-in-out;
        }

        .form-box { display: none; animation: fadeIn 0.5s ease forwards; }
        .form-box.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { color: #1a5276; font-size: 30px; font-weight: 800; margin-bottom: 10px; }
        p { color: #2980b9; font-size: 14px; margin-bottom: 30px; font-weight: 600; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #1a5276; font-size: 18px; }
        
        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid transparent;
            border-radius: 20px;
            color: #1a5276;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus { border-color: #3498db; background: #fff; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2); }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #1a5276, #3498db);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(26, 82, 118, 0.2);
        }

        .btn:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 15px 30px rgba(26, 82, 118, 0.3); }

        .toggle-text { margin-top: 25px; font-size: 14px; color: #1a5276; }
        .toggle-text span { color: #0c2461; font-weight: 800; cursor: pointer; text-decoration: underline; }

    </style>
</head>
<body>

    <div class="particle" style="left: 10%; width: 50px; height: 50px; animation-delay: 0s;"></div>
    <div class="particle" style="left: 30%; width: 30px; height: 30px; animation-delay: 4s;"></div>
    <div class="particle" style="left: 70%; width: 60px; height: 60px; animation-delay: 2s;"></div>
    <div class="particle" style="left: 90%; width: 20px; height: 20px; animation-delay: 6s;"></div>

    <div class="card">
        <div id="signup-form" class="form-box active">
            <h2>Sign Up</h2>
            <p>Naya account banayein</p>
            <form>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Register Now</button>
            </form>
            <div class="toggle-text">Pehle se account hai? <span onclick="toggleForm('login')">Login karein</span></div>
        </div>

        <div id="login-form" class="form-box">
            <h2>Login</h2>
            <p>Apne account mein wapas aiye</p>
            <form>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="toggle-text">Account nahi hai? <span onclick="toggleForm('signup')">Sign up karein</span></div>
        </div>
    </div>

    <script>
        function toggleForm(type) {
            const signup = document.getElementById('signup-form');
            const login = document.getElementById('login-form');
            
            if(type === 'login') {
                signup.classList.remove('active');
                login.classList.add('active');
            } else {
                login.classList.remove('active');
                signup.classList.add('active');
            }
        }
    </script>
</body>
</html>
